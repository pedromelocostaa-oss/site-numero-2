<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jet Clean — numero2 | Higiene Moderna</title>
  <meta name="description" content="Jet Clean: bidê higiênico acoplável, sem obra, sem energia elétrica. Instalação em 8 minutos. R$247 com frete grátis." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* =============================================
       RESET & BASE
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: 'DM Sans', sans-serif;
      color: #1A1A1A;
      background: #FDFAF6;
      line-height: 1.6;
      overflow-x: hidden;
    }
    img { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }

    /* =============================================
       VARIÁVEIS
    ============================================= */
    :root {
      --blue: #2471A3;
      --blue-dark: #1a5580;
      --blue-light: #e8f4fc;
      --black: #1A1A1A;
      --brown-dark: #2C2416;
      --beige-light: #F5EFE6;
      --beige-dark: #EDE4D6;
      --off-white: #FDFAF6;
      --red: #c0392b;
      --green-whatsapp: #25D366;
      --green-whatsapp-dark: #1da851;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-hover: 0 8px 40px rgba(0,0,0,0.14);
      --transition: 0.2s ease;
    }

    /* =============================================
       TIPOGRAFIA
    ============================================= */
    h1, h2, h3, h4 {
      font-family: 'Playfair Display', Georgia, serif;
      line-height: 1.2;
      color: #1A1A1A;
    }
    h1 { font-size: clamp(2rem, 5vw, 3.4rem); font-weight: 700; }
    h2 { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 700; }
    h3 { font-size: clamp(1.2rem, 3vw, 1.6rem); font-weight: 600; }
    h4 { font-size: 1.1rem; font-weight: 600; }
    p { font-size: 1rem; color: #3a3a3a; }

    /* =============================================
       UTILITIES
    ============================================= */
    .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }
    .section { padding: 80px 0; }
    .section-sm { padding: 56px 0; }
    .section-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 12px;
      display: block;
    }
    .text-center { text-align: center; }
    .text-blue { color: var(--blue); }
    .bg-beige { background: var(--beige-light); }
    .bg-dark { background: var(--brown-dark); color: #FDFAF6; }
    .bg-off { background: var(--off-white); }

    /* =============================================
       BUTTONS
    ============================================= */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition), filter var(--transition);
      min-height: 48px;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
    .btn:active { transform: translateY(0); }

    .btn-blue {
      background: var(--blue);
      color: #fff;
    }
    .btn-blue:hover { background: var(--blue-dark); }

    .btn-whatsapp {
      background: var(--green-whatsapp);
      color: #fff;
    }
    .btn-whatsapp:hover { background: var(--green-whatsapp-dark); }

    .btn-outline {
      background: transparent;
      color: var(--blue);
      border: 2px solid var(--blue);
    }
    .btn-outline:hover { background: var(--blue); color: #fff; }

    .btn-lg { padding: 17px 36px; font-size: 1.1rem; }

    /* =============================================
       NAVBAR
    ============================================= */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: var(--off-white);
      transition: box-shadow var(--transition);
      border-bottom: 1px solid transparent;
    }
    #navbar.scrolled {
      box-shadow: 0 2px 20px rgba(0,0,0,0.10);
      border-bottom-color: var(--beige-dark);
    }
    .navbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 24px;
    }
    .logo {
      display: flex;
      flex-direction: column;
      line-height: 1;
      user-select: none;
      flex-shrink: 0;
    }
    .logo-text {
      font-family: Georgia, 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 400;
      letter-spacing: -0.01em;
    }
    .logo-text .blue { color: var(--blue); }
    .logo-text .dark { color: var(--black); }
    .logo-tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #888;
      margin-top: 2px;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
      list-style: none;
    }
    .nav-links a {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: #555;
      padding: 6px 12px;
      border-radius: 8px;
      transition: color var(--transition), background var(--transition);
    }
    .nav-links a:hover { color: var(--blue); background: var(--beige-light); }
    .nav-cta { margin-left: 8px; }

    /* Mobile menu toggle */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
    }
    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--black);
      border-radius: 2px;
      transition: all 0.2s;
    }

    /* =============================================
       HERO
    ============================================= */
    #hero {
      background: var(--beige-light);
      padding: 140px 0 80px;
      overflow: hidden;
      position: relative;
    }
    .hero-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 56px;
      align-items: center;
    }
    .hero-content { }
    .hero-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid var(--beige-dark);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--blue);
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }
    .hero-label::before { content: "✦"; font-size: 0.65rem; }
    .hero-headline {
      margin-bottom: 20px;
    }
    .hero-sub {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 32px;
      max-width: 480px;
      line-height: 1.7;
    }
    .hero-price-block {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 32px;
    }
    .hero-price {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--blue);
      line-height: 1;
    }
    .hero-price-from {
      font-size: 0.9rem;
      color: #888;
      text-decoration: line-through;
    }
    .hero-price-note {
      font-size: 0.85rem;
      color: #555;
      font-weight: 500;
    }
    .hero-ctas {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .hero-trust {
      margin-top: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 0.82rem;
      color: #777;
      flex-wrap: wrap;
    }
    .hero-trust span { display: flex; align-items: center; gap: 5px; }
    .hero-trust .icon { font-size: 0.9rem; }

    .hero-visual {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .hero-product-mockup {
      width: 360px;
      height: 360px;
      background: linear-gradient(135deg, #d4eaf7 0%, #fff 60%, #e8f4fc 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 20px 60px rgba(36,113,163,0.15);
    }
    .product-icon-big {
      font-size: 9rem;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.12));
      user-select: none;
    }
    .hero-badge {
      position: absolute;
      background: #fff;
      border: 1px solid var(--beige-dark);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 0.78rem;
      font-weight: 600;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .hero-badge-1 { top: 30px; right: -10px; }
    .hero-badge-2 { bottom: 60px; left: -20px; }
    .hero-badge-3 { top: 50%; right: -30px; transform: translateY(-50%); }

    /* =============================================
       SOCIAL PROOF BAR
    ============================================= */
    #proof-bar {
      background: var(--brown-dark);
      padding: 0;
    }
    .proof-bar-inner {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0;
    }
    .proof-item {
      padding: 28px 20px;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.08);
      transition: background var(--transition);
    }
    .proof-item:last-child { border-right: none; }
    .proof-item:hover { background: rgba(255,255,255,0.04); }
    .proof-number {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      margin-bottom: 6px;
    }
    .proof-number span { color: var(--blue); }
    .proof-desc {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.65);
      line-height: 1.4;
      font-weight: 500;
    }

    /* =============================================
       PROBLEMA
    ============================================= */
    #problema { background: var(--off-white); }
    .problema-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin: 40px 0;
    }
    .problema-card {
      background: #fff;
      border: 1px solid var(--beige-dark);
      border-radius: var(--radius);
      padding: 32px;
      transition: box-shadow var(--transition), transform var(--transition);
    }
    .problema-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-3px); }
    .problema-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .problema-card-icon { font-size: 1.6rem; }
    .problema-card h3 { font-size: 1.15rem; }
    .problema-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .problema-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.9rem;
      color: #444;
      line-height: 1.5;
    }
    .x-icon {
      color: var(--red);
      font-size: 0.85rem;
      font-weight: 700;
      margin-top: 2px;
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      background: #fde8e6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .problema-transition {
      text-align: center;
      padding: 24px;
      background: var(--beige-light);
      border-radius: var(--radius);
      border: 1px solid var(--beige-dark);
      margin-bottom: 32px;
    }
    .problema-transition p {
      font-size: 1.05rem;
      font-weight: 500;
      color: #444;
      margin-bottom: 20px;
    }

    /* =============================================
       PRODUTO / SOLUÇÃO
    ============================================= */
    #solucao { background: var(--beige-light); }
    .solucao-inner {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 40px;
      align-items: center;
      margin: 40px 0;
    }
    .solucao-benefits { display: flex; flex-direction: column; gap: 24px; }
    .benefit-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 16px;
      border-radius: 10px;
      transition: background var(--transition);
    }
    .benefit-item:hover { background: #fff; }
    .benefit-right { flex-direction: row-reverse; text-align: right; }
    .benefit-icon {
      width: 44px;
      height: 44px;
      background: var(--blue-light);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .benefit-text h4 { font-size: 1rem; margin-bottom: 4px; }
    .benefit-text p { font-size: 0.85rem; color: #666; line-height: 1.5; }

    .product-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .product-image-wrap {
      width: 260px;
      height: 260px;
      background: linear-gradient(145deg, #d4eaf7, #fff);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 16px 48px rgba(36,113,163,0.18);
      font-size: 8rem;
      transition: transform var(--transition);
    }
    .product-image-wrap:hover { transform: scale(1.04); }
    .product-price-tag {
      background: var(--blue);
      color: #fff;
      padding: 8px 20px;
      border-radius: 100px;
      font-weight: 700;
      font-size: 1.1rem;
    }

    /* =============================================
       COMO FUNCIONA
    ============================================= */
    #como-funciona { background: var(--off-white); }
    .como-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      margin-top: 40px;
    }
    .steps-list { display: flex; flex-direction: column; gap: 0; }
    .step-item {
      display: flex;
      gap: 20px;
      padding: 24px 0;
      border-bottom: 1px solid var(--beige-dark);
      transition: background var(--transition);
    }
    .step-item:last-child { border-bottom: none; }
    .step-number {
      width: 44px;
      height: 44px;
      background: var(--blue);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .step-content h4 { margin-bottom: 6px; }
    .step-content p { font-size: 0.9rem; color: #666; line-height: 1.6; }

    .como-visual {
      background: linear-gradient(135deg, var(--blue-light), var(--beige-light));
      border-radius: 20px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 320px;
      gap: 16px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--beige-dark);
    }
    .como-visual-icon { font-size: 5rem; }
    .como-visual p {
      font-size: 0.95rem;
      color: #555;
      text-align: center;
      max-width: 260px;
    }

    /* =============================================
       INSTALAÇÃO
    ============================================= */
    #instalacao { background: var(--beige-light); }
    .instalacao-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin-top: 40px;
      align-items: start;
    }
    .instalacao-diagram {
      background: linear-gradient(135deg, #1a5580 0%, var(--blue) 100%);
      border-radius: 16px;
      padding: 36px;
      color: #fff;
    }
    .instalacao-diagram h3 {
      color: #fff;
      margin-bottom: 24px;
      font-size: 1.2rem;
    }
    .install-steps-diagram { display: flex; flex-direction: column; gap: 16px; }
    .install-step-d {
      display: flex;
      gap: 14px;
      align-items: center;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 14px 16px;
      transition: background var(--transition);
    }
    .install-step-d:hover { background: rgba(255,255,255,0.18); }
    .install-step-num {
      width: 32px;
      height: 32px;
      background: #fff;
      color: var(--blue);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      flex-shrink: 0;
    }
    .install-step-d span { font-size: 0.88rem; line-height: 1.5; }
    .install-time-badge {
      margin-top: 24px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .instalacao-cards { display: flex; flex-direction: column; gap: 16px; }
    .install-card {
      background: #fff;
      border: 1px solid var(--beige-dark);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      transition: box-shadow var(--transition), transform var(--transition);
    }
    .install-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .install-card-icon {
      width: 48px;
      height: 48px;
      background: var(--blue-light);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .install-card h4 { margin-bottom: 4px; }
    .install-card p { font-size: 0.85rem; color: #666; }

    /* =============================================
       OBJEÇÕES (ACCORDION)
    ============================================= */
    #objecoes { background: var(--off-white); }
    .accordion { display: flex; flex-direction: column; gap: 10px; margin-top: 40px; max-width: 760px; margin-left: auto; margin-right: auto; }
    .acc-item {
      background: #fff;
      border: 1px solid var(--beige-dark);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow var(--transition);
    }
    .acc-item:hover { box-shadow: var(--shadow); }
    .acc-trigger {
      width: 100%;
      background: none;
      border: none;
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--black);
      gap: 16px;
      transition: background var(--transition);
    }
    .acc-trigger:hover { background: var(--beige-light); }
    .acc-trigger[aria-expanded="true"] { background: var(--blue-light); color: var(--blue); }
    .acc-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--beige-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 700;
      flex-shrink: 0;
      color: var(--blue);
      transition: transform var(--transition), background var(--transition);
    }
    .acc-trigger[aria-expanded="true"] .acc-icon { transform: rotate(45deg); background: var(--blue-light); }
    .acc-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.2s ease;
    }
    .acc-body.open { max-height: 200px; }
    .acc-body-inner {
      padding: 0 24px 20px;
      font-size: 0.95rem;
      color: #555;
      line-height: 1.7;
      border-top: 1px solid var(--beige-dark);
      padding-top: 16px;
    }

    /* =============================================
       PARA QUEM É
    ============================================= */
    #para-quem { background: var(--beige-light); }
    .para-quem-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-top: 40px;
    }
    .pq-card {
      background: #fff;
      border: 1px solid var(--beige-dark);
      border-radius: var(--radius);
      padding: 28px 22px;
      text-align: center;
      transition: box-shadow var(--transition), transform var(--transition);
    }
    .pq-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-4px); }
    .pq-icon {
      font-size: 2.6rem;
      margin-bottom: 16px;
      display: block;
    }
    .pq-card h4 { margin-bottom: 8px; font-size: 1rem; }
    .pq-card p { font-size: 0.84rem; color: #666; line-height: 1.5; }

    /* =============================================
       DEPOIMENTOS
    ============================================= */
    #depoimentos { background: var(--brown-dark); }
    .dep-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 40px;
    }
    .dep-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--radius);
      padding: 28px;
      transition: background var(--transition), transform var(--transition);
    }
    .dep-card:hover { background: rgba(255,255,255,0.10); transform: translateY(-3px); }
    .dep-stars {
      color: #f5c518;
      font-size: 1rem;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }
    .dep-text {
      font-size: 0.92rem;
      color: rgba(255,255,255,0.85);
      line-height: 1.7;
      margin-bottom: 20px;
      font-style: italic;
    }
    .dep-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .dep-avatar {
      width: 40px;
      height: 40px;
